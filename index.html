<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danger Messenger</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0e0e0e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.15);
      overflow: hidden;
      position: relative;
    }
    #authScreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }
    .logo-auth {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #e53935;
      margin-bottom: 30px;
      text-transform: uppercase;
    }
    .auth-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .auth-form input {
      padding: 14px 20px;
      font-size: 1rem;
      border: 2px solid #e53935;
      background: transparent;
      color: #fff;
      border-radius: 40px;
      outline: none;
    }
    .auth-form input:focus { border-color: #ff5252; }
    .auth-form button {
      padding: 14px;
      font-weight: 700;
      border: none;
      background: #e53935;
      color: #fff;
      border-radius: 40px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 6px;
    }
    .auth-form button:hover { background: #ff5252; }
    .error-msg {
      color: #ff5252;
      font-size: 0.85rem;
      text-align: center;
    }
    #chatListScreen, #chatScreen {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    .header {
      padding: 16px 20px;
      background: #111;
      border-bottom: 2px solid #e53935;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-weight: 700; font-size: 1.5rem; color: #e53935; letter-spacing: 2px; }
    .user-info { font-size: 0.85rem; color: #aaa; display: flex; gap: 10px; align-items: center; }
    .logout-btn {
      background: none;
      border: 1px solid #e53935;
      color: #e53935;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .logout-btn:hover { background: #e53935; color: #fff; }
    .chat-list {
      flex: 1;
      overflow-y: auto;
      background: #181818;
      padding: 10px;
    }
    .chat-item {
      padding: 14px;
      border-bottom: 1px solid #2a2a2a;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-item:hover { background: #252525; }
    .chat-item-avatar {
      width: 40px; height: 40px;
      background: #333;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #e53935;
    }
    .chat-item-info {
      flex: 1;
    }
    .chat-item-nick {
      font-weight: 600;
      color: #fff;
    }
    .chat-item-lastmsg {
      font-size: 0.8rem;
      color: #888;
      margin-top: 2px;
    }
    .add-btn {
      position: absolute;
      bottom: 30px;
      right: 20px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #e53935;
      border: none;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 10;
    }
    .add-btn:hover { background: #ff5252; }
    #searchOverlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      z-index: 20;
    }
    .search-box {
      width: 100%;
      display: flex;
      gap: 10px;
      margin-top: 50px;
    }
    .search-box input {
      flex: 1;
      padding: 12px 20px;
      background: #222;
      border: 1px solid #e53935;
      border-radius: 30px;
      color: #fff;
    }
    .search-box button {
      padding: 12px 20px;
      background: #e53935;
      border: none;
      color: #fff;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
    }
    .search-results {
      margin-top: 20px;
      width: 100%;
      color: #ccc;
    }
    .search-result-item {
      padding: 12px;
      border: 1px solid #333;
      border-radius: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .start-chat-btn {
      background: #e53935;
      border: none;
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
    }
    #chatScreen .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #181818;
    }
    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 18px;
      word-break: break-word;
      line-height: 1.4;
    }
    .own { align-self: flex-end; background: #2b2b2b; border-bottom-right-radius: 4px; }
    .other { align-self: flex-start; background: #1f1f1f; border-bottom-left-radius: 4px; }
    .message .author { font-weight: 600; font-size: 0.85rem; color: #e53935; margin-bottom: 4px; }
    .message .text { font-size: 0.95rem; }
    .message .time { font-size: 0.7rem; color: #888; margin-top: 6px; text-align: right; }
    .input-area {
      display: flex;
      padding: 12px 16px;
      background: #111;
      border-top: 1px solid #333;
    }
    .input-area input {
      flex: 1;
      padding: 12px 18px;
      background: #222;
      border: 1px solid #333;
      border-radius: 30px;
      color: #e0e0e0;
      outline: none;
    }
    .input-area input:focus { border-color: #e53935; }
    .input-area button {
      margin-left: 10px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #e53935;
      border: none;
      color: #fff;
      font-size: 1.4rem;
      font-weight: bold;
      cursor: pointer;
    }
    .back-btn {
      background: none;
      border: none;
      color: #e53935;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0 10px;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>
<div class="container" id="appContainer">
  <div id="authScreen">
    <div class="logo-auth">DANGER</div>
    <div class="auth-form">
      <input type="text" id="nickInput" placeholder="Никнейм" maxlength="20" autocomplete="off">
      <input type="password" id="passwordInput" placeholder="Пароль" autocomplete="off">
      <button id="authSubmitBtn">Войти / Регистрация</button>
      <div id="authError" class="error-msg"></div>
    </div>
  </div>

  <div id="chatListScreen">
    <div class="header">
      <span class="logo">DANGER</span>
      <div class="user-info">
        <span id="myNickLabel"></span>
        <button id="logoutBtn" class="logout-btn">Выйти</button>
      </div>
    </div>
    <div id="chatListContainer" class="chat-list"></div>
    <button id="addChatBtn" class="add-btn">+</button>
  </div>

  <div id="chatScreen">
    <div class="header">
      <button id="backToListBtn" class="back-btn">←</button>
      <span id="chatPartnerLabel" style="color:#e53935; font-weight:600;"></span>
      <div></div>
    </div>
    <div id="messagesContainer" class="messages"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Введите сообщение..." maxlength="500">
      <button id="sendBtn">→</button>
    </div>
  </div>

  <div id="searchOverlay">
    <button id="closeSearchBtn" style="align-self:flex-end; background:none; border:none; color:#e53935; font-size:1.5rem; cursor:pointer;">✕</button>
    <div class="search-box">
      <input type="text" id="searchNickInput" placeholder="Введите никнейм">
      <button id="searchBtn">Найти</button>
    </div>
    <div id="searchResults" class="search-results"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gun/gun.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/sea.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/lib/radix.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/lib/radisk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/lib/store.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/lib/rindexed.js"></script>

<script>
  (function() {
    // Подключаемся к публичному relay для координации пиров
    const gun = Gun({
      peers: ['https://gun-manhattan.herokuapp.com/gun']
    });
    const user = gun.user();
    const SEA = Gun.SEA;

    // DOM
    const authScreen = document.getElementById('authScreen');
    const chatListScreen = document.getElementById('chatListScreen');
    const chatScreen = document.getElementById('chatScreen');
    const searchOverlay = document.getElementById('searchOverlay');
    const nickInput = document.getElementById('nickInput');
    const passwordInput = document.getElementById('passwordInput');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    const authError = document.getElementById('authError');
    const myNickLabel = document.getElementById('myNickLabel');
    const logoutBtn = document.getElementById('logoutBtn');
    const chatListContainer = document.getElementById('chatListContainer');
    const addChatBtn = document.getElementById('addChatBtn');
    const backToListBtn = document.getElementById('backToListBtn');
    const chatPartnerLabel = document.getElementById('chatPartnerLabel');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const searchNickInput = document.getElementById('searchNickInput');
    const searchBtn = document.getElementById('searchBtn');
    const searchResults = document.getElementById('searchResults');
    const closeSearchBtn = document.getElementById('closeSearchBtn');

    let currentUser = null;
    let currentNick = '';
    let activeChatId = null;
    let activePartnerNick = null;
    let chatsSubscription = null;
    let messagesSubscription = null;
    const chatListItems = {};

    // Вход / Регистрация
    authSubmitBtn.addEventListener('click', async () => {
      const nick = nickInput.value.trim();
      const pass = passwordInput.value;
      if (!nick || !pass) {
        authError.textContent = 'Введите никнейм и пароль';
        return;
      }

      // Проверяем, не занят ли никнейм другим пользователем
      const existing = await new Promise(resolve => {
        gun.get('users').get(nick).once(data => resolve(data));
      });

      if (existing && existing.pub) {
        // Такой ник уже есть, пытаемся войти с введённым паролем
        user.auth(nick, pass, (ack) => {
          if (ack.err) {
            authError.textContent = 'Неверный пароль или никнейм уже занят';
          } else {
            onAuthSuccess(user.is.pub, nick);
          }
        });
      } else {
        // Ник свободен — создаём нового пользователя
        user.create(nick, pass, (ack) => {
          if (ack.err) {
            authError.textContent = ack.err;
          } else {
            // Сохраняем публичный ключ в глобальном списке
            gun.get('users').get(nick).put({ pub: ack.pub });
            onAuthSuccess(ack.pub, nick);
          }
        });
      }
    });

    function onAuthSuccess(pub, nick) {
      currentUser = { pub };
      currentNick = nick;
      myNickLabel.textContent = nick;
      authScreen.style.display = 'none';
      chatListScreen.style.display = 'flex';
      chatScreen.style.display = 'none';
      searchOverlay.style.display = 'none';
      authError.textContent = '';
      nickInput.value = '';
      passwordInput.value = '';
      loadChatList();
    }

    // Выход
    logoutBtn.addEventListener('click', () => {
      user.leave();
      currentUser = null;
      currentNick = '';
      authScreen.style.display = 'flex';
      chatListScreen.style.display = 'none';
      chatScreen.style.display = 'none';
      if (chatsSubscription) chatsSubscription.off();
      if (messagesSubscription) messagesSubscription.off();
    });

    // Загрузка списка чатов
    function loadChatList() {
      if (!currentUser) return;
      if (chatsSubscription) chatsSubscription.off();
      const chatsRef = gun.get('~' + currentUser.pub).get('chats');
      chatsSubscription = chatsRef.map().on((data, chatId) => {
        if (!data || !chatId) return;
        updateChatListItem(chatId, data);
      });
    }

    function updateChatListItem(chatId, data) {
      if (!data.partnerNick) return;
      let item = chatListItems[chatId];
      if (!item) {
        item = document.createElement('div');
        item.className = 'chat-item';
        item.innerHTML = `
          <div class="chat-item-avatar">${data.partnerNick.charAt(0).toUpperCase()}</div>
          <div class="chat-item-info">
            <div class="chat-item-nick">${escapeHtml(data.partnerNick)}</div>
            <div class="chat-item-lastmsg">${escapeHtml((data.lastMessage || '').substring(0, 40))}</div>
          </div>
        `;
        item.addEventListener('click', () => openChat(chatId, data.partnerNick, data.partnerPub));
        chatListContainer.appendChild(item);
        chatListItems[chatId] = item;
      } else {
        const lastMsgEl = item.querySelector('.chat-item-lastmsg');
        lastMsgEl.textContent = escapeHtml((data.lastMessage || '').substring(0, 40));
        chatListContainer.prepend(item);
      }
    }

    // Поиск пользователей
    addChatBtn.addEventListener('click', () => {
      searchOverlay.style.display = 'flex';
      searchNickInput.value = '';
      searchResults.innerHTML = '';
    });
    closeSearchBtn.addEventListener('click', () => searchOverlay.style.display = 'none');

    searchBtn.addEventListener('click', () => {
      const query = searchNickInput.value.trim();
      if (!query) return;
      gun.get('users').get(query).once((data) => {
        searchResults.innerHTML = '';
        if (!data || !data.pub) {
          searchResults.innerHTML = '<p>Пользователь не найден</p>';
          return;
        }
        if (data.pub === currentUser.pub) {
          searchResults.innerHTML = '<p>Нельзя начать чат с самим собой</p>';
          return;
        }
        const div = document.createElement('div');
        div.className = 'search-result-item';
        div.innerHTML = `<span>${escapeHtml(query)}</span>`;
        const startBtn = document.createElement('button');
        startBtn.className = 'start-chat-btn';
        startBtn.textContent = 'Написать';
        startBtn.addEventListener('click', () => startChatWithUser(data.pub, query));
        div.appendChild(startBtn);
        searchResults.appendChild(div);
      });
    });

    async function startChatWithUser(partnerPub, partnerNick) {
      const sortedPubs = [currentUser.pub, partnerPub].sort();
      const chatId = sortedPubs.join('_');
      const myChatsRef = gun.get('~' + currentUser.pub).get('chats');
      myChatsRef.get(chatId).put({
        partnerPub: partnerPub,
        partnerNick: partnerNick,
        lastMessage: '',
        lastTime: Date.now()
      });
      gun.get('~' + partnerPub).get('chats').get(chatId).put({
        partnerPub: currentUser.pub,
        partnerNick: currentNick,
        lastMessage: '',
        lastTime: Date.now()
      });
      searchOverlay.style.display = 'none';
      openChat(chatId, partnerNick, partnerPub);
    }

    // Открытие чата
    function openChat(chatId, partnerNick, partnerPub) {
      activeChatId = chatId;
      activePartnerNick = partnerNick;
      chatListScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      chatPartnerLabel.textContent = partnerNick;
      messagesContainer.innerHTML = '';
      messageInput.focus();

      if (messagesSubscription) messagesSubscription.off();
      const messagesRef = gun.get('chats').get(chatId).get('messages');
      messagesSubscription = messagesRef.map().on((msgData, msgId) => {
        if (!msgData || !msgId) return;
        if (document.getElementById(`msg-${msgId}`)) return;
        const isOwn = msgData.senderPub === currentUser.pub;
        addMessageElement(msgId, msgData.senderNick, msgData.text, msgData.time, isOwn);
      });
    }

    function addMessageElement(msgId, senderNick, text, time, isOwn) {
      const div = document.createElement('div');
      div.id = `msg-${msgId}`;
      div.className = `message ${isOwn ? 'own' : 'other'}`;
      div.innerHTML = `
        <div class="author">${escapeHtml(senderNick)}</div>
        <div class="text">${escapeHtml(text)}</div>
        <div class="time">${escapeHtml(time)}</div>
      `;
      messagesContainer.appendChild(div);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    backToListBtn.addEventListener('click', () => {
      if (messagesSubscription) messagesSubscription.off();
      chatScreen.style.display = 'none';
      chatListScreen.style.display = 'flex';
      activeChatId = null;
    });

    // Отправка сообщений
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !activeChatId || !currentUser) return;
      const now = new Date();
      const time = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
      const msgId = Gun.text.random();
      const msg = {
        senderPub: currentUser.pub,
        senderNick: currentNick,
        text: text,
        time: time,
        timestamp: Date.now()
      };
      gun.get('chats').get(activeChatId).get('messages').get(msgId).put(msg);
      gun.get('~' + currentUser.pub).get('chats').get(activeChatId).put({
        lastMessage: text,
        lastTime: Date.now()
      });
      const partnerPub = activeChatId.split('_').find(p => p !== currentUser.pub);
      if (partnerPub) {
        gun.get('~' + partnerPub).get('chats').get(activeChatId).put({
          lastMessage: text,
          lastTime: Date.now()
        });
      }
      messageInput.value = '';
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    // Восстановление сессии при перезагрузке
    gun.on('auth', async () => {
      if (user.is) {
        currentUser = user.is;
        // Пытаемся восстановить никнейм из приватного хранилища
        const nickNode = gun.get('~' + user.is.pub).get('nick');
        nickNode.once((data) => {
          if (data) {
            currentNick = data;
            myNickLabel.textContent = currentNick;
            authScreen.style.display = 'none';
            chatListScreen.style.display = 'flex';
            loadChatList();
          } else {
            // если ник не сохранён (старый аккаунт), выходим
            user.leave();
          }
        });
      }
    });
  })();
</script>
</body>
</html>
